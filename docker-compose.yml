# ARTE Chatbot Docker Compose
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: arte-chatbot-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: arte-chatbot-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
