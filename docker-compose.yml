# ARTE Chatbot Docker Compose
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
          - GIT_COMMIT_HASH=${GIT_COMMIT_HASH:-unknown}
    image: arte-chatbot-backend
    container_name: arte-chatbot-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8000
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - GIT_COMMIT_HASH=${GIT_COMMIT_HASH:-unknown}
    container_name: arte-chatbot-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - API_URL=http://localhost:8000
      - GIT_COMMIT_HASH=${GIT_COMMIT_HASH:-unknown}
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: arte-chatbot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  redis_data:
