# ARTE Chatbot Docker Compose
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
          - GIT_COMMIT_HASH=${GIT_COMMIT_HASH:-unknown}
    image: arte-chatbot-backend
    container_name: arte-chatbot-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - GIT_COMMIT_HASH=${GIT_COMMIT_HASH:-unknown}
    container_name: arte-chatbot-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - API_URL=http://localhost:8000
      - GIT_COMMIT_HASH=${GIT_COMMIT_HASH:-unknown}
    depends_on:
      - backend
    restart: unless-stopped

  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    container_name: arte-admin-panel
    ports:
      - "3001:3000"
    environment:
      # This is a NEXT_PUBLIC value consumed by the browser; use localhost for local Docker runs.
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
