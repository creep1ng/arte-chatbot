<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arte Chatbot</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary: #f5f5f5;
      --bg-secondary: #ffffff;
      --bg-user-msg: #0078d4;
      --bg-bot-msg: #ffffff;
      --bg-input: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --text-user-msg: #ffffff;
      --text-bot-msg: #1a1a1a;
      --border-color: #e0e0e0;
      --accent: #0078d4;
      --accent-hover: #106ebe;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.12);
      --radius: 12px;
      --radius-sm: 8px;
    }

    html,
    body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 800px;
      margin: 0 auto;
      background: var(--bg-secondary);
      box-shadow: var(--shadow-lg);
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: var(--accent);
      color: #ffffff;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: rgba(255, 255, 255, 0.18);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .header-badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
    }

    /* Messages container */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar {
      width: 6px;
    }

    .messages::-webkit-scrollbar-thumb {
      background: #c0c0c0;
      border-radius: 3px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 75%;
      animation: messageIn 0.25s ease-out;
    }

    @keyframes messageIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message--user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message--bot {
      align-self: flex-start;
      align-items: flex-start;
    }

    .message-bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message--user .message-bubble {
      background: var(--bg-user-msg);
      color: var(--text-user-msg);
      border-bottom-right-radius: 4px;
    }

    .message--bot .message-bubble {
      background: var(--bg-bot-msg);
      color: var(--text-bot-msg);
      border: 1px solid var(--border-color);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow);
    }

    .message-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
      font-size: 11px;
      color: var(--text-secondary);
    }

    .message-meta-separator {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--text-secondary);
    }

    /* Typing indicator */
    .typing-indicator {
      display: none;
      align-self: flex-start;
      align-items: flex-start;
      flex-direction: column;
      gap: 4px;
    }

    .typing-indicator.visible {
      display: flex;
    }

    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
      background: var(--bg-bot-msg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow);
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #999;
      animation: typingBounce 1.4s infinite ease-in-out;
    }

    .typing-dot:nth-child(1) {
      animation-delay: 0s;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typingBounce {
      0%,
      80%,
      100% {
        transform: scale(0.6);
        opacity: 0.4;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .typing-label {
      font-size: 11px;
      color: var(--text-secondary);
      font-style: italic;
    }

    /* Input area */
    .input-area {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-top: 1px solid var(--border-color);
      background: var(--bg-secondary);
      flex-shrink: 0;
    }

    .input-field {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border-color);
      border-radius: 24px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      background: var(--bg-input);
      transition: border-color 0.2s;
    }

    .input-field:focus {
      border-color: var(--accent);
    }

    .input-field:disabled {
      background: #f0f0f0;
      cursor: not-allowed;
      user-select: none;
      pointer-events: none;
    }

    .send-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 50%;
      background: var(--accent);
      color: #ffffff;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }

    .send-btn:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .send-btn:active:not(:disabled) {
      transform: scale(0.95);
    }

    .send-btn:disabled {
      background: #b0b0b0;
      cursor: not-allowed;
    }

    .send-btn svg {
      width: 20px;
      height: 20px;
    }

    /* Welcome message */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      text-align: center;
      color: var(--text-secondary);
    }

    .welcome-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .welcome-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .welcome-subtitle {
      font-size: 14px;
      max-width: 320px;
    }

    /* API Key Modal */
    .api-key-modal {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
    }

    .api-key-modal.hidden {
      display: none;
    }

    .api-key-card {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 32px;
      width: 100%;
      max-width: 400px;
      margin: 20px;
    }

    .api-key-icon {
      font-size: 40px;
      text-align: center;
      margin-bottom: 16px;
    }

    .api-key-title {
      font-size: 18px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .api-key-description {
      font-size: 14px;
      text-align: center;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .api-key-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .api-key-input {
      padding: 12px 16px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .api-key-input:focus {
      border-color: var(--accent);
    }

    .api-key-submit {
      padding: 12px 16px;
      background: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .api-key-submit:hover {
      background: var(--accent-hover);
    }

    .api-key-submit:disabled {
      background: #b0b0b0;
      cursor: not-allowed;
    }

    .api-key-error {
      color: #dc2626;
      font-size: 13px;
      text-align: center;
    }

    .api-key-card.has-error .api-key-input {
      border-color: #dc2626;
    }

    /* Escalation badge */
    .escalation-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 8px;
      padding: 4px 10px;
      background: #fef3c7;
      color: #92400e;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }

    /* Error message */
    .message--error .message-bubble {
      background: #fef2f2;
      color: #991b1b;
      border-color: #fecaca;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .app {
        max-width: 100%;
      }

      .message {
        max-width: 88%;
      }

      .header {
        padding: 12px 16px;
      }

      .input-area {
        padding: 12px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- API Key Modal -->
    <div class="api-key-modal" id="apiKeyModal">
      <div class="api-key-card" id="apiKeyCard">
        <div class="api-key-icon">&#128273;</div>
        <div class="api-key-title">Configurar API Key</div>
        <div class="api-key-description">
          Ingresa tu CHAT_API_KEY para comenzar a usar el chatbot.
        </div>
        <form class="api-key-form" id="apiKeyForm">
          <input
            type="password"
            class="api-key-input"
            id="apiKeyInput"
            placeholder="Ingresa tu CHAT_API_KEY"
            autocomplete="off"
          />
          <div class="api-key-error" id="apiKeyError" style="display: none;"></div>
          <button type="submit" class="api-key-submit" id="apiKeySubmit">
            Continuar
          </button>
        </form>
      </div>
    </div>

    <!-- Header -->
    <div class="header">
      <span class="header-title">Arte Chatbot</span>
      <span class="header-badge" id="modelBadge" style="display: none">
        <span class="header-badge-dot"></span>
        <span id="modelName"></span>
      </span>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">&#128161;</div>
        <div class="welcome-title">Bienvenido a Arte Chatbot</div>
        <div class="welcome-subtitle">
          Consulta sobre paneles solares, inversores, controladores y baterias.
          Escribe tu pregunta para comenzar.
        </div>
      </div>
    </div>

    <!-- Typing indicator -->
    <div class="typing-indicator" id="typingIndicator">
      <div class="typing-bubble">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>
      <span class="typing-label" id="typingLabel">Generando respuesta...</span>
    </div>

    <!-- Input -->
    <div class="input-area">
      <input
        type="text"
        class="input-field"
        id="inputField"
        placeholder="Escribe un mensaje..."
        autocomplete="off"
      />
      <button class="send-btn" id="sendBtn" title="Enviar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <!-- Config injected by entrypoint -->
  <script src="config.js"></script>

  <script>
    (function () {
      "use strict";

      // --- State ---
      let sessionId = null;
      let isProcessing = false;
      let apiKey = null;
      let isEscalated = false;

      // --- DOM refs ---
      const messagesEl = document.getElementById("messages");
      const inputField = document.getElementById("inputField");
      const sendBtn = document.getElementById("sendBtn");
      const welcomeEl = document.getElementById("welcome");
      const typingIndicator = document.getElementById("typingIndicator");
      const typingLabel = document.getElementById("typingLabel");
      const modelBadge = document.getElementById("modelBadge");
      const modelNameEl = document.getElementById("modelName");
      const apiKeyModal = document.getElementById("apiKeyModal");
      const apiKeyCard = document.getElementById("apiKeyCard");
      const apiKeyForm = document.getElementById("apiKeyForm");
      const apiKeyInput = document.getElementById("apiKeyInput");
      const apiKeyError = document.getElementById("apiKeyError");
      const apiKeySubmit = document.getElementById("apiKeySubmit");

      // --- Config (from config.js generated by entrypoint) ---
      const API_URL = window.ARTE_CONFIG?.API_URL || "http://localhost:8000";
      const DEFAULT_API_KEY = window.ARTE_CONFIG?.CHAT_API_KEY || "";
      const MODEL = window.ARTE_CONFIG?.LLM_MODEL || "unknown";

      // Show model in header
      if (MODEL && MODEL !== "unknown") {
        modelNameEl.textContent = MODEL;
        modelBadge.style.display = "inline-flex";
      }

      // --- Check for stored API key or use default ---
      function getStoredApiKey() {
        try {
          return sessionStorage.getItem("arte_chat_api_key");
        } catch (_) {
          return null;
        }
      }

      function setStoredApiKey(key) {
        try {
          sessionStorage.setItem("arte_chat_api_key", key);
        } catch (_) {}
      }

      function initApiKey() {
        apiKey = getStoredApiKey() || DEFAULT_API_KEY;
        if (!apiKey) {
          showApiKeyModal();
        } else {
          hideApiKeyModal();
        }
      }

      function showApiKeyModal() {
        apiKeyModal.classList.remove("hidden");
        apiKeyInput.focus();
      }

      function hideApiKeyModal() {
        apiKeyModal.classList.add("hidden");
        inputField.focus();
      }

      function showApiKeyError(message) {
        apiKeyError.textContent = message;
        apiKeyError.style.display = "block";
        apiKeyCard.classList.add("has-error");
      }

      function clearApiKeyError() {
        apiKeyError.style.display = "none";
        apiKeyCard.classList.remove("has-error");
      }

      // --- Helpers ---
      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      function formatTime(ms) {
        if (ms < 1000) return `${Math.round(ms)}ms`;
        return `${(ms / 1000).toFixed(1)}s`;
      }

      function scrollToBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      // --- Render messages ---
      function addMessage(text, type, meta) {
        // Hide welcome on first message
        if (welcomeEl) {
          welcomeEl.remove();
        }

        const wrapper = document.createElement("div");
        wrapper.className = `message message--${type}`;

        const bubble = document.createElement("div");
        bubble.className = "message-bubble";
        bubble.textContent = text;
        wrapper.appendChild(bubble);

        if (meta) {
          const metaEl = document.createElement("div");
          metaEl.className = "message-meta";

          const parts = [];
          if (meta.time) parts.push(escapeHtml(meta.time));
          if (meta.duration) parts.push(escapeHtml(meta.duration));
          if (meta.model) parts.push(escapeHtml(meta.model));

          metaEl.innerHTML = parts.join(
            '<span class="message-meta-separator"></span>'
          );
          wrapper.appendChild(metaEl);
        }

        if (type === "bot" && meta?.escalate) {
          const badge = document.createElement("div");
          badge.className = "escalation-badge";
          badge.innerHTML =
            "&#9888; Escalado a agente humano" +
            (meta.reason ? ` &mdash; ${escapeHtml(meta.reason)}` : "");
          wrapper.appendChild(badge);
        }

        messagesEl.appendChild(wrapper);
        scrollToBottom();
        return wrapper;
      }

      // --- Typing indicator ---
      function showTyping() {
        typingIndicator.classList.add("visible");
        messagesEl.appendChild(typingIndicator);
        scrollToBottom();
      }

      function hideTyping() {
        typingIndicator.classList.remove("visible");
      }

      // --- Set processing state ---
      function setProcessing(processing) {
        isProcessing = processing;
        inputField.disabled = processing || !apiKey;
        sendBtn.disabled = processing || !apiKey;
        if (!processing && apiKey) {
          inputField.focus();
        }
      }

      // --- Send message ---
      async function sendMessage() {
        const text = inputField.value.trim();
        if (!text || isProcessing || isEscalated) return;

        if (!apiKey) {
          showApiKeyModal();
          return;
        }

        // Clear input and set processing
        inputField.value = "";
        setProcessing(true);

        // Add user message
        const now = new Date();
        const timeStr = now.toLocaleTimeString("es-ES", {
          hour: "2-digit",
          minute: "2-digit",
        });
        addMessage(text, "user", { time: timeStr });

        // Show typing indicator
        showTyping();

        // Build request
        const body = { message: text };
        if (sessionId) {
          body.session_id = sessionId;
        }

        const startTime = performance.now();

        try {
          const response = await fetch(`${API_URL}/chat`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-API-Key": apiKey,
            },
            body: JSON.stringify(body),
          });

          const elapsed = performance.now() - startTime;

          if (!response.ok) {
            let errorDetail = `HTTP ${response.status}`;
            try {
              const errBody = await response.json();
              if (errBody.detail) errorDetail = errBody.detail;
            } catch (_) {
              // ignore parse error
            }
            hideTyping();
            addMessage(`Error: ${errorDetail}`, "error");
            setProcessing(false);
            return;
          }

          const data = await response.json();

          // Store session ID
          if (data.session_id) {
            sessionId = data.session_id;
          }

          hideTyping();

          // Add bot response
          const responseTime = new Date();
          const responseTimeStr = responseTime.toLocaleTimeString("es-ES", {
            hour: "2-digit",
            minute: "2-digit",
          });

          addMessage(data.response, "bot", {
            time: responseTimeStr,
            duration: formatTime(elapsed),
            model: MODEL,
            escalate: data.escalate,
            reason: data.reason,
          });

          if (data.escalate) {
            isEscalated = true;
            inputField.disabled = true;
            inputField.placeholder = "Conversacion escalada a un agente humano";
            sendBtn.disabled = true;
          }
        } catch (error) {
          hideTyping();
          addMessage(
            `Error de conexion: ${error.message || "No se pudo conectar al servidor."}`,
            "error"
          );
        } finally {
          setProcessing(false);
        }
      }

      // --- Event listeners ---
      sendBtn.addEventListener("click", sendMessage);

      inputField.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      // API Key form submission
      apiKeyForm.addEventListener("submit", function (e) {
        e.preventDefault();
        const key = apiKeyInput.value.trim();
        if (!key) {
          showApiKeyError("Por favor ingresa una API Key.");
          return;
        }
        clearApiKeyError();
        apiKey = key;
        setStoredApiKey(key);
        hideApiKeyModal();
        setProcessing(false);
        inputField.focus();
      });

      // Clear error on input
      apiKeyInput.addEventListener("input", clearApiKeyError);

      // Initialize API key on load
      initApiKey();
    })();
  </script>
</body>
</html>
