<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arte Admin</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f7fb;
      color: #172033;
    }

    body {
      align-items: center;
      display: flex;
      min-height: 100vh;
      margin: 0;
      justify-content: center;

      border-radius: 20px;
      box-shadow: 0 20px 50px rgb(23 32 51 / 10%);
      max-width: 560px;
      padding: 40px;
    }

    p {
      color: #4a5873;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <p>Arte Soluciones Energéticas</p>

</html>
