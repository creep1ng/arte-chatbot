# ARTE Chatbot CI Pipeline
# Lint + Health Check Test for Pull Requests

name: CI

on:
  push:
    branches: [main, develop, "**"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  DOCKER_COMPOSE_FILE: docker-compose.yml
  KILO_MODEL: kilo/bytedance-seed/dola-seed-2.0-pro:free

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --frozen --group lint

      - name: Run Ruff linter
        run: uv run ruff check backend/ rag/

      - name: Run Ruff format check
        run: uv run ruff format --check backend/ rag/

      - name: Audit Python dependencies
        run: uvx pip-audit --progress-spinner off

      - name: Check Python syntax
        run: |
          python -m py_compile backend/main.py

  build:
    name: Build Docker Container
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker compose build backend

      - name: Export Docker image
        run: docker save arte-chatbot-backend -o backend-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: backend-image.tar
          retention-days: 1

  test-health:
    name: Test /health Endpoint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: ./artifact

      - name: Load Docker image
        run: docker load -i ./artifact/backend-image.tar

      - name: Mask secrets
        run: |
          echo "::add-mask::${{ secrets.CHAT_API_KEY }}"
          echo "::add-mask::${{ secrets.OPENAI_API_KEY }}"

      - name: Create temporary .env and start containers
        env:
          CHAT_API_KEY: ${{ secrets.CHAT_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cat > .env <<EOF
          CHAT_API_KEY=${CHAT_API_KEY}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          EOF
          docker compose up -d --no-build backend
          rm -f .env

      - name: Wait for service to be ready
        run: |
          echo "Waiting for service to start..."
          for i in {1..30}; do
            if curl -f http://localhost:8000/health 2>/dev/null; then
              echo "Service is ready!"
              exit 0
            fi
            echo "Attempt $i/30: Service not ready yet..."
            sleep 2
          done
          echo "Service failed to start in time"
          docker logs arte-chatbot-backend
          exit 1

      - name: Test /health endpoint returns 200
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
          echo "Health check response code: $RESPONSE"
          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Health endpoint returned 200 OK"
          else
            echo "❌ Health endpoint returned $RESPONSE instead of 200"
            exit 1
          fi

      - name: Verify health response body
        run: |
          BODY=$(curl -s http://localhost:8000/health)
          echo "Health response: $BODY"
          if echo "$BODY" | grep -q "healthy"; then
            echo "✅ Health response contains 'healthy' status"
          else
            echo "❌ Health response missing 'healthy' status"
            exit 1
          fi

      - name: Show container logs on success
        if: success()
        run: docker logs arte-chatbot-backend

      - name: Show container logs on failure
        if: failure()
        run: docker logs arte-chatbot-backend

  evaluation:
    name: Run Evaluation Harness
    runs-on: ubuntu-latest
    needs: test-health
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: ./artifact

      - name: Load Docker image
        run: docker load -i ./artifact/backend-image.tar

      - name: Mask secrets
        run: |
          echo "::add-mask::${{ secrets.CHAT_API_KEY }}"
          echo "::add-mask::${{ secrets.OPENAI_API_KEY }}"

      - name: Create temporary .env and start containers
        env:
          CHAT_API_KEY: ${{ secrets.CHAT_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cat > .env <<EOF
          CHAT_API_KEY=${CHAT_API_KEY}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          EOF
          docker compose up -d --no-build backend
          rm -f .env

      - name: Wait for service to be ready
        run: |
          echo "Waiting for service to start..."
          for i in {1..30}; do
            if curl -f http://localhost:8000/health 2>/dev/null; then
              echo "Service is ready!"
              exit 0
            fi
            echo "Attempt $i/30: Service not ready yet..."
            sleep 2
          done
          echo "Service failed to start in time"
          docker logs arte-chatbot-backend
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r evaluation/harness/requirements.txt

      - name: Configure AWS credentials for S3 upload
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-2' }}

      - name: Run evaluation harness
        env:
          CHAT_API_KEY: ${{ secrets.CHAT_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EVAL_S3_PREFIX: evaluation/ci/${{ github.ref_name }}/${{ github.run_id }}/
          AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}
        run: |
          uv run python -m evaluation.harness.run

      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evaluation-results
          path: evaluation/harness/output/
          retention-days: 30

      - name: Show container logs on failure
        if: failure()
        run: docker logs arte-chatbot-backend

  cleanup:
    name: Cleanup Containers
    runs-on: ubuntu-latest
    needs: evaluation
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create dummy .env file
        run: touch .env

      - name: Stop and remove containers
        run: docker compose down --volumes

      - name: Clean up Docker
        run: |
          docker system prune -f || true
