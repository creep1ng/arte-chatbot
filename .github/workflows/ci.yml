# ARTE Chatbot CI Pipeline
# Lint + Health Check Test for Pull Requests

name: CI

on:
  push:
    branches: [main, develop, "**"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  DOCKER_COMPOSE_FILE: docker-compose.yml
  KILO_MODEL: kilo/bytedance-seed/dola-seed-2.0-pro:free

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff linter
        run: |
          ruff check backend/
        continue-on-error: true

      - name: Run Ruff format check
        run: |
          ruff format --check backend/
        continue-on-error: true

      - name: Check Python syntax
        run: |
          python -m py_compile backend/main.py

  build:
    name: Build Docker Container
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker compose build backend

  test-health:
    name: Test /health Endpoint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file for Docker Compose
        run: |
          cat > .env <<EOF
          CHAT_API_KEY=${{ secrets.CHAT_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          EOF

      - name: Start containers
        run: docker compose up -d backend

      - name: Wait for service to be ready
        run: |
          echo "Waiting for service to start..."
          for i in {1..30}; do
            if curl -f http://localhost:8000/health 2>/dev/null; then
              echo "Service is ready!"
              exit 0
            fi
            echo "Attempt $i/30: Service not ready yet..."
            sleep 2
          done
          echo "Service failed to start in time"
          docker compose logs backend
          exit 1

      - name: Test /health endpoint returns 200
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
          echo "Health check response code: $RESPONSE"
          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Health endpoint returned 200 OK"
          else
            echo "❌ Health endpoint returned $RESPONSE instead of 200"
            exit 1
          fi

      - name: Verify health response body
        run: |
          BODY=$(curl -s http://localhost:8000/health)
          echo "Health response: $BODY"
          if echo "$BODY" | grep -q "healthy"; then
            echo "✅ Health response contains 'healthy' status"
          else
            echo "❌ Health response missing 'healthy' status"
            exit 1
          fi

      - name: Show container logs on success
        if: success()
        run: docker compose logs backend

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs backend

  evaluation:
    name: Run Evaluation Harness
    runs-on: ubuntu-latest
    needs: test-health
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file for Docker Compose
        run: |
          cat > .env <<EOF
          CHAT_API_KEY=${{ secrets.CHAT_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          EOF

      - name: Start containers
        run: docker compose up -d backend

      - name: Wait for service to be ready
        run: |
          echo "Waiting for service to start..."
          for i in {1..30}; do
            if curl -f http://localhost:8000/health 2>/dev/null; then
              echo "Service is ready!"
              exit 0
            fi
            echo "Attempt $i/30: Service not ready yet..."
            sleep 2
          done
          echo "Service failed to start in time"
          docker compose logs backend
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r evaluation/harness/requirements.txt

      - name: Run evaluation harness
        run: |
          uv run python -m evaluation.harness.run

      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evaluation-results
          path: evaluation/harness/output/
          retention-days: 30

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs backend

  cleanup:
    name: Cleanup Containers
    runs-on: ubuntu-latest
    needs: evaluation
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create dummy .env file
        run: touch .env

      - name: Stop and remove containers
        run: docker compose down --volumes

      - name: Clean up Docker
        run: |
          docker system prune -f || true

  update-agents-md:
    name: Auto-update AGENTS.md
    runs-on: ubuntu-latest
    needs: cleanup
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Kilo CLI
        uses: Kilo-Org/kilocode@v1
        with:
          version: latest

      - name: Authenticate Kilo
        run: |
          echo "$KILO_API_KEY" | kilo-cli login --api-key-stdin
        env:
          KILO_API_KEY: ${{ secrets.KILO_API_KEY }}

      - name: Update AGENTS.md
        run: |
          timeout 600s kilo-cli chat --model "$KILO_MODEL" --no-interactive --trust-all-tools --require-mcp-startup "Usa la skill agent-md-refactor para refactorizar AGENTS.md siguiendo principios de progressive disclosure. Organiza el contenido en archivos categorizados y crea un AGENTS.md minimalista con enlaces a los documentos detallados."
        env:
          KILO_LOG_NO_COLOR: 1
          KILO_MODEL: ${{ env.KILO_MODEL }}

      - name: Commit changes
        run: |
          git config user.name "kilo-ci[bot]"
          git config user.email "kilo-ci@users.noreply.github.com"
          git config core.hooksPath /dev/null
          git add AGENTS.md .kilo/
          git commit -m "chore: [CI] Refactor AGENTS.md usando agent-md-refactor skill" || true
          git push
