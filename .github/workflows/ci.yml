# ARTE Chatbot CI Pipeline
# Lint + Health Check Test for Pull Requests

name: CI

on:
  push:
    branches: [main, develop, "**"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  DOCKER_COMPOSE_FILE: docker-compose.yml

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff linter
        run: |
          ruff check backend/
        continue-on-error: true

      - name: Run Ruff format check
        run: |
          ruff format --check backend/
        continue-on-error: true

      - name: Check Python syntax
        run: |
          python -m py_compile backend/main.py

  build:
    name: Build Docker Container
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker compose build backend

  test-health:
    name: Test /health Endpoint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start containers
        run: docker compose up -d backend

      - name: Wait for service to be ready
        run: |
          echo "Waiting for service to start..."
          for i in {1..30}; do
            if curl -f http://localhost:8000/health 2>/dev/null; then
              echo "Service is ready!"
              exit 0
            fi
            echo "Attempt $i/30: Service not ready yet..."
            sleep 2
          done
          echo "Service failed to start in time"
          docker compose logs backend
          exit 1

      - name: Test /health endpoint returns 200
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
          echo "Health check response code: $RESPONSE"
          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Health endpoint returned 200 OK"
          else
            echo "❌ Health endpoint returned $RESPONSE instead of 200"
            exit 1
          fi

      - name: Verify health response body
        run: |
          BODY=$(curl -s http://localhost:8000/health)
          echo "Health response: $BODY"
          if echo "$BODY" | grep -q "healthy"; then
            echo "✅ Health response contains 'healthy' status"
          else
            echo "❌ Health response missing 'healthy' status"
            exit 1
          fi

      - name: Show container logs on success
        if: success()
        run: docker compose logs backend

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs backend

  cleanup:
    name: Cleanup Containers
    runs-on: ubuntu-latest
    needs: test-health
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Stop and remove containers
        run: docker compose down --volumes

      - name: Clean up Docker
        run: |
          docker system prune -f || true
