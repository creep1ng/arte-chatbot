# ARTE Chatbot CI/CD pipeline
# PRs build/test/evaluate and may publish immutable candidate images.
# Production deploys are gated to push events on main and use AWS OIDC.

name: CI

on:
  push:
    branches: [main, develop, "**"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  KILO_MODEL: kilo/bytedance-seed/dola-seed-2.0-pro:free
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-2' }}

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --frozen --group lint

      - name: Run Ruff linter
        run: uv run ruff check backend/ rag/

      - name: Run Ruff format check
        run: uv run ruff format --check backend/ rag/

      - name: Audit Python dependencies
        run: uvx pip-audit --progress-spinner off

      - name: Check Python syntax
        run: python -m py_compile backend/main.py

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build --build-arg GIT_COMMIT_HASH=${{ github.sha }} -t arte-chatbot-backend -f backend/Dockerfile .

      - name: Build frontend image
        run: docker build --build-arg GIT_COMMIT_HASH=${{ github.sha }} -t arte-chatbot-frontend -f frontend/Dockerfile .

      - name: Build admin image
        run: docker build --build-arg GIT_COMMIT_HASH=${{ github.sha }} -t arte-chatbot-admin -f admin/Dockerfile .

      - name: Export Docker images
        run: |
          docker save arte-chatbot-backend -o backend-image.tar
          docker save arte-chatbot-frontend -o frontend-image.tar
          docker save arte-chatbot-admin -o admin-image.tar

      - name: Upload backend image artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: backend-image.tar
          retention-days: 1

      - name: Upload frontend image artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: frontend-image.tar
          retention-days: 1

      - name: Upload admin image artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-image
          path: admin-image.tar
          retention-days: 1

  test-health:
    name: Test /health Endpoint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend image artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: ./artifact

      - name: Load backend image
        run: docker load -i ./artifact/backend-image.tar

      - name: Mask secrets
        run: |
          echo "::add-mask::${{ secrets.CHAT_API_KEY }}"
          echo "::add-mask::${{ secrets.OPENAI_API_KEY }}"

      - name: Create temporary .env and start backend
        env:
          CHAT_API_KEY: ${{ secrets.CHAT_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cat > .env <<EOF
          CHAT_API_KEY=${CHAT_API_KEY}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          EOF
          docker compose up -d --no-build backend
          rm -f .env

      - name: Wait for service to be ready
        run: |
          echo "Waiting for service to start..."
          for i in {1..30}; do
            if curl -f http://localhost:8000/health 2>/dev/null; then
              echo "Service is ready!"
              exit 0
            fi
            echo "Attempt $i/30: Service not ready yet..."
            sleep 2
          done
          echo "Service failed to start in time"
          docker logs arte-chatbot-backend
          exit 1

      - name: Test /health endpoint returns 200
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
          echo "Health check response code: $RESPONSE"
          test "$RESPONSE" = "200"

      - name: Verify health response body
        run: |
          BODY=$(curl -s http://localhost:8000/health)
          echo "Health response: $BODY"
          echo "$BODY" | grep -q "healthy"

      - name: Show container logs on failure
        if: failure()
        run: docker logs arte-chatbot-backend

  evaluation:
    name: Run Evaluation Harness
    runs-on: ubuntu-latest
    needs: test-health
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Download backend image artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: ./artifact

      - name: Load backend image
        run: docker load -i ./artifact/backend-image.tar

      - name: Mask secrets
        run: |
          echo "::add-mask::${{ secrets.CHAT_API_KEY }}"
          echo "::add-mask::${{ secrets.OPENAI_API_KEY }}"

      - name: Create temporary .env and start backend
        env:
          CHAT_API_KEY: ${{ secrets.CHAT_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cat > .env <<EOF
          CHAT_API_KEY=${CHAT_API_KEY}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          EOF
          docker compose up -d --no-build backend
          rm -f .env

      - name: Wait for service to be ready
        run: |
          echo "Waiting for service to start..."
          for i in {1..30}; do
            if curl -f http://localhost:8000/health 2>/dev/null; then
              echo "Service is ready!"
              exit 0
            fi
            echo "Attempt $i/30: Service not ready yet..."
            sleep 2
          done
          echo "Service failed to start in time"
          docker logs arte-chatbot-backend
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r evaluation/harness/requirements.txt

      - name: Configure AWS credentials for S3 upload
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run evaluation harness
        env:
          CHAT_API_KEY: ${{ secrets.CHAT_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EVAL_S3_PREFIX: evaluation/ci/${{ github.ref_name }}/${{ github.run_id }}/
          AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}
        run: uv run python -m evaluation.harness.run

      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evaluation-results
          path: evaluation/harness/output/
          retention-days: 30

      - name: Show container logs on failure
        if: failure()
        run: docker logs arte-chatbot-backend

  publish-candidate-images:
    name: Publish PR Candidate Images
    runs-on: ubuntu-latest
    needs: evaluation
    if: github.event_name == 'pull_request'
    permissions:
      id-token: write
      contents: read
    env:
      CANDIDATE_TAG: pr-${{ github.event.pull_request.number }}-sha-${{ github.sha }}
      SHA_TAG: sha-${{ github.sha }}
    steps:
      - name: Download backend image artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: ./artifact

      - name: Download frontend image artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-image
          path: ./artifact

      - name: Download admin image artifact
        uses: actions/download-artifact@v4
        with:
          name: admin-image
          path: ./artifact

      - name: Load built images
        run: |
          docker load -i ./artifact/backend-image.tar
          docker load -i ./artifact/frontend-image.tar
          docker load -i ./artifact/admin-image.tar

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push immutable PR candidate tags
        run: |
          push_if_missing() {
            local image_name="$1"
            local repository_url="$2"
            local tag="$3"
            local repository_name="${repository_url##*/}"

            docker tag "${image_name}" "${repository_url}:${tag}"
            if aws ecr describe-images --repository-name "${repository_name}" --image-ids imageTag="${tag}" >/dev/null 2>&1; then
              echo "ECR tag already exists, skipping push: ${repository_name}:${tag}"
              return 0
            fi
            docker push "${repository_url}:${tag}"
          }

          push_if_missing arte-chatbot-backend "${{ vars.BACKEND_ECR_REPOSITORY_URL }}" "${CANDIDATE_TAG}"
          push_if_missing arte-chatbot-frontend "${{ vars.FRONTEND_ECR_REPOSITORY_URL }}" "${CANDIDATE_TAG}"
          push_if_missing arte-chatbot-admin "${{ vars.ADMIN_ECR_REPOSITORY_URL }}" "${CANDIDATE_TAG}"
          push_if_missing arte-chatbot-backend "${{ vars.BACKEND_ECR_REPOSITORY_URL }}" "${SHA_TAG}"
          push_if_missing arte-chatbot-frontend "${{ vars.FRONTEND_ECR_REPOSITORY_URL }}" "${SHA_TAG}"
          push_if_missing arte-chatbot-admin "${{ vars.ADMIN_ECR_REPOSITORY_URL }}" "${SHA_TAG}"

  publish-release-images:
    name: Publish Main Release Images
    runs-on: ubuntu-latest
    needs: evaluation
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    env:
      SHA_TAG: sha-${{ github.sha }}
    steps:
      - name: Download backend image artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: ./artifact

      - name: Download frontend image artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-image
          path: ./artifact

      - name: Download admin image artifact
        uses: actions/download-artifact@v4
        with:
          name: admin-image
          path: ./artifact

      - name: Load built images
        run: |
          docker load -i ./artifact/backend-image.tar
          docker load -i ./artifact/frontend-image.tar
          docker load -i ./artifact/admin-image.tar

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push immutable release SHA tags
        run: |
          push_if_missing() {
            local image_name="$1"
            local repository_url="$2"
            local tag="$3"
            local repository_name="${repository_url##*/}"

            docker tag "${image_name}" "${repository_url}:${tag}"
            if aws ecr describe-images --repository-name "${repository_name}" --image-ids imageTag="${tag}" >/dev/null 2>&1; then
              echo "ECR tag already exists, skipping push: ${repository_name}:${tag}"
              return 0
            fi
            docker push "${repository_url}:${tag}"
          }

          push_if_missing arte-chatbot-backend "${{ vars.BACKEND_ECR_REPOSITORY_URL }}" "${SHA_TAG}"
          push_if_missing arte-chatbot-frontend "${{ vars.FRONTEND_ECR_REPOSITORY_URL }}" "${SHA_TAG}"
          push_if_missing arte-chatbot-admin "${{ vars.ADMIN_ECR_REPOSITORY_URL }}" "${SHA_TAG}"

  deploy-production:
    name: Deploy Production EC2 Compose
    runs-on: ubuntu-latest
    needs: publish-release-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    env:
      TF_IN_AUTOMATION: "true"
      SHA_TAG: sha-${{ github.sha }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-2' }}
      TF_VAR_vpc_id: ${{ vars.PROD_VPC_ID }}
      TF_VAR_public_subnet_id: ${{ vars.PROD_PUBLIC_SUBNET_ID }}
      TF_VAR_ec2_compose_instance_type: ${{ vars.PROD_EC2_COMPOSE_INSTANCE_TYPE || 't3.small' }}
      TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_cloudflare_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID }}
      TF_VAR_backend_hostname: ${{ secrets.PROD_BACKEND_HOSTNAME }}
      TF_VAR_frontend_hostname: ${{ secrets.PROD_FRONTEND_HOSTNAME }}
      TF_VAR_admin_hostname: ${{ secrets.PROD_ADMIN_HOSTNAME }}
      TF_VAR_edge_tunnel_secret: ${{ secrets.PROD_EDGE_TUNNEL_SECRET }}
      TF_VAR_backend_runtime_environment_variables: ${{ vars.PROD_BACKEND_RUNTIME_ENV_JSON || '{}' }}
      TF_VAR_backend_runtime_secret_arns: ${{ secrets.PROD_BACKEND_RUNTIME_SECRET_ARNS_JSON }}
      TF_VAR_aws_bucket_name: ${{ secrets.AWS_BUCKET_NAME }}
      TF_VAR_github_owner: ${{ github.repository_owner }}
      TF_VAR_github_repository: ${{ github.event.repository.name }}
      TF_VAR_create_github_oidc_role: "false"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Mask externally supplied hostnames
        run: |
          echo "::add-mask::${TF_VAR_backend_hostname}"
          echo "::add-mask::${TF_VAR_frontend_hostname}"
          echo "::add-mask::${TF_VAR_admin_hostname}"

      - name: Terraform init
        run: terraform -chdir=infra/terraform/envs/prod init

      - name: Terraform apply production EC2 Compose inputs
        run: |
          terraform -chdir=infra/terraform/envs/prod apply -auto-approve \
            -var="initial_image_tag=${SHA_TAG}"

      - name: Capture EC2 Compose host metadata
        id: compose-host
        run: |
          INSTANCE_ID=$(terraform -chdir=infra/terraform/envs/prod output -json ec2_compose_host | python -c 'import json, sys; print(json.load(sys.stdin)["instance_id"])')
          echo "instance-id=${INSTANCE_ID}" >> "${GITHUB_OUTPUT}"

      - name: Deploy EC2 Compose stack through SSM
        run: |
          echo "Waiting for EC2 instance to become SSM-managed: ${{ steps.compose-host.outputs.instance-id }}"
          for i in {1..40}; do
            PING_STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${{ steps.compose-host.outputs.instance-id }}" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text)

            if [[ "${PING_STATUS}" == "Online" ]]; then
              echo "EC2 instance is online in SSM"
              break
            fi

            echo "Attempt $i/40: SSM status is ${PING_STATUS}; waiting..."
            sleep 15
          done

          if [[ "${PING_STATUS}" != "Online" ]]; then
            echo "EC2 instance did not become SSM-managed in time"
            exit 1
          fi

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.compose-host.outputs.instance-id }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy arte-chatbot ${SHA_TAG}" \
            --parameters commands="/opt/arte-chatbot/deploy.sh ${SHA_TAG}" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "${COMMAND_ID}" \
            --instance-id "${{ steps.compose-host.outputs.instance-id }}"

          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${{ steps.compose-host.outputs.instance-id }}" \
            --query "{Status:Status,ResponseCode:ResponseCode}" \
            --output table

      - name: Verify backend health through Cloudflare
        run: |
          for i in {1..30}; do
            if curl -fsS "https://${TF_VAR_backend_hostname}/health"; then
              exit 0
            fi
            echo "Attempt $i/30: production backend health is not ready yet"
            sleep 10
          done
          echo "Production backend health check failed"
          exit 1

  cleanup:
    name: Cleanup Containers
    runs-on: ubuntu-latest
    needs: evaluation
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create dummy .env file
        run: touch .env

      - name: Stop and remove containers
        run: docker compose down --volumes

      - name: Clean up Docker
        run: docker system prune -f || true
